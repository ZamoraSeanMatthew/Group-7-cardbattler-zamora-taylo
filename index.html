<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CARD BATTLER</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050b18;
            --card-blue: #1e293b;
            --accent: #f59e0b;
            --player-glow: #3b82f6;
            --cpu-glow: #ef4444;
            --text: #f8fafc;
            --card-w: 130px;
            --card-h: 206px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #111827 0%, #050b18 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease forwards;
        }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HUD --- */
        .hud { width: 100%; display: flex; justify-content: space-between; position: absolute; top: 20px; padding: 0 40px; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 12px; border-bottom: 4px solid var(--accent); min-width: 180px; backdrop-filter: blur(10px); }

        /* --- Landing/Setup --- */
        #landing h1 { font-family: 'Orbitron', sans-serif; font-size: 5rem; color: var(--accent); text-shadow: 0 0 30px rgba(245, 158, 11, 0.6); margin-bottom: 20px; }
        .btn-main { padding: 18px 50px; font-family: 'Orbitron', sans-serif; background: var(--accent); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; color: #000; margin: 10px; }
        .btn-main:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--accent); }
        .btn-secondary { background: transparent; color: var(--accent); border: 2px solid var(--accent); }

        /* --- History Table --- */
        .history-container { width: 100%; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { font-family: 'Orbitron'; color: var(--accent); font-size: 0.8rem; }

        /* --- Cards & Grid --- */
        .card { width: var(--card-w); height: var(--card-h); background: var(--card-blue); border-radius: 10px; background-size: cover; background-position: center; border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card-container { display: flex; gap: 20px; margin-top: 20px; }
        .board-layout { display: flex; width: 100%; align-items: center; justify-content: center; gap: 40px; }
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; transition: 0.8s; }
        .history-grid.expanded { transform: scale(1.2); }
        .history-slot { width: 140px; height: 222px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 8px; background-size: cover; background-position: center; }

        /* --- Choice Overlay --- */
        .choice-overlay { position: fixed; inset: 0; background: rgba(5, 11, 24, 0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn-choice { padding: 20px; font-size: 1.4rem; border-radius: 12px; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px; width: 280px; }
        .up { background: #10b981; color: white; }
        .down { background: #ef4444; color: white; }
        .btn-peek { background: #334155; color: white; margin-top: 30px; padding: 12px 30px; border-radius: 8px; cursor: pointer; border: none; }
        .result-text { font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 25px; }
        .correct { color: #10b981; }
        .wrong { color: #ef4444; }

        /* --- Pause Overlay --- */
        .pause-overlay { position: fixed; inset: 0; background: rgba(5, 11, 24, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 150; }
        .pause-overlay.active { display: flex; }
        .pause-menu { text-align: center; background: rgba(20, 40, 80, 0.95); padding: 60px 80px; border: 3px solid var(--accent); border-radius: 20px; box-shadow: 0 0 50px rgba(245, 158, 11, 0.5); }
        .pause-menu h1 { font-family: 'Orbitron'; font-size: 5rem; color: var(--accent); margin-bottom: 50px; text-shadow: 0 0 40px rgba(245, 158, 11, 0.8); letter-spacing: 3px; }
        .pause-menu button { padding: 20px 60px; font-family: 'Orbitron'; font-size: 1.4rem; margin: 20px; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .resume-btn { background: var(--accent); color: #000; }
        .resume-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--accent); }
        .quit-btn { background: #ef4444; color: white; }
        .quit-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ef4444; }
        .pause-btn { position: absolute; top: 20px; right: 40px; background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; transition: 0.3s; z-index: 11; display: none; font-size: 0.95rem; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        .pause-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--accent); }
    </style>
</head>
<body>

    <div id="hud" style="display: none;" class="hud">
        <div class="score-box" style="border-color: var(--player-glow)">
            <div id="pNameDisp" style="font-family: 'Orbitron'; font-size: 14px; color: #94a3b8;">Player</div>
            <div id="pScoreDisp" style="font-size: 28px; font-weight: bold;">0</div>
        </div>
        <div class="score-box" style="border-color: var(--cpu-glow); text-align: right;">
            <div id="cNameDisp" style="font-family: 'Orbitron'; font-size: 14px; color: #94a3b8;">CPU</div>
            <div id="cScoreDisp" style="font-size: 28px; font-weight: bold;">0</div>
        </div>
        <button class="pause-btn" onclick="togglePause()" id="pauseBtn">⏸ PAUSE</button>
    </div>

    <section id="landing" class="screen active">
        <h1>CARD BATTLER</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" onclick="showScreen('setup')">ENTER ARENA</button>
            <button class="btn-main btn-secondary" onclick="showHistory()">SCORE HISTORY</button>
        </div>
    </section>

    <section id="setup" class="screen">
        <div style="background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
            <h2 style="font-family: 'Orbitron'; margin-bottom:30px;">IDENTIFY YOURSELF</h2>
            <input type="text" id="playerName" placeholder="Input Name..." style="width: 100%; padding: 15px; margin-bottom: 30px; border-radius: 10px; border: none; background: #0f172a; color: white; font-size: 1.1rem; border-bottom: 2px solid var(--accent);">
            <button class="btn-main" onclick="startGame()">START BATTLE</button>
            <button class="btn-main btn-secondary" onclick="showScreen('landing')">← BACK</button>
        </div>
    </section>

    <section id="selection" class="screen">
        <h2 style="font-family: 'Orbitron'; color: var(--accent); margin-bottom: 40px;">SELECT YOUR PRIMORDIAL CARD</h2>
        <div class="card-container" id="firstCardPool"></div>
        <button class="btn-main btn-secondary" style="margin-top: 40px;" onclick="showScreen('setup')">← BACK</button>
    </section>

    <section id="mainBoard" class="screen">
        <div class="board-layout" id="boardLayout">
            <div id="pSide" style="text-align: center;">
                <div class="card" id="pBigCard" style="width: 180px; height: 285px; margin-bottom: 15px; box-shadow: 0 0 30px var(--player-glow);"></div>
                <div id="pLabel" style="font-family: 'Orbitron'; color: var(--player-glow);"></div>
            </div>
            <div class="history-grid" id="historyGrid"></div>
            <div id="cSide" style="text-align: center;">
                <div class="card" id="cBigCard" style="width: 180px; height: 285px; margin-bottom: 15px; box-shadow: 0 0 30px var(--cpu-glow);"></div>
                <div id="cLabel" style="font-family: 'Orbitron'; color: var(--cpu-glow);"></div>
            </div>
        </div>
    </section>

    <div id="choiceOverlay" class="choice-overlay">
        <h2 id="qTitle" style="font-family: 'Orbitron'; margin-bottom: 30px;">WHAT IS THE NEXT CARD?</h2>
        <div id="choiceActions">
            <button class="btn-choice up" onclick="makeChoice('up')">HIGHER ↑</button>
            <button class="btn-choice down" onclick="makeChoice('down')">LOWER ↓</button>
            <br>
            <button class="btn-peek" onclick="peekBoard()">PEEK BOARD (5s)</button>
        </div>
        <div id="loadingBox" style="display: none; text-align: center;">
            <p id="resultMsg" class="result-text"></p>
            <div id="cpuThinking" style="font-family: 'Orbitron'; color: var(--accent); letter-spacing: 5px;">ANALYZING CPU...</div>
        </div>
    </div>

    <div id="pauseOverlay" class="pause-overlay">
        <div class="pause-menu">
            <h1>PAUSED</h1>
            <button class="resume-btn pause-menu button" onclick="togglePause()">RESUME</button>
            <button class="quit-btn pause-menu button" onclick="quitGame()">QUIT TO MENU</button>
        </div>
    </div>

<script>
    // --- State Management ---
    let deck = [], pName = "", cName = "", pScore = 0, cScore = 0;
    let currentFileNum = 0, round = 1;
    let isPaused = false;

    function getCardValue(fileNum) { return ((fileNum - 1) % 13) + 1; }

    // --- Core Functions ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function buildDeck() {
        deck = Array.from({length: 52}, (_, i) => i + 1);
        for(let i = deck.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
    }

    function startGame() {
        pName = document.getElementById('playerName').value.trim();
        if (!pName) {
            Swal.fire({
                title: 'NAME REQUIRED',
                text: 'Please enter a player name to begin battle.',
                background: '#050b18',
                color: '#fff',
                confirmButtonText: 'OK'
            });
            return;
        }
        cName = ["Viper", "Glitch", "Shadow", "Neon", "Cipher", "Phoenix", "Blaze", "Revenant", "Specter", "Nexus", "Rogue", "Eclipse", "Inferno", "Vortex", "Titan", "Zodiac"][Math.floor(Math.random()*16)];
        document.getElementById('pNameDisp').innerText = pName;
        document.getElementById('cNameDisp').innerText = cName;
        document.getElementById('hud').style.display = 'flex';
        buildDeck();
        const pool = document.getElementById('firstCardPool');
        pool.innerHTML = '';
        const poolCards = [deck.shift(), deck.shift(), deck.shift(), deck.shift()];
        poolCards.forEach(num => {
            const c = document.createElement('div');
            c.className = 'card';
            c.style.backgroundImage = `url('images/cards/back.jpg')`;
            c.onclick = () => {
                currentFileNum = num;
                showScreen('mainBoard');
                initBoard(num, poolCards.find(n => n !== num));
                setTimeout(startRound, 1500);
            };
            pool.appendChild(c);
        });
        showScreen('selection');
    }

    
    function initBoard(pNum, cNum) {
        const grid = document.getElementById('historyGrid');
        grid.innerHTML = ''; grid.classList.remove('expanded');
        for(let i=0; i<10; i++) {
            const s = document.createElement('div'); s.className = 'history-slot'; s.id = `slot-${i}`;
            grid.appendChild(s);
        }
        document.getElementById('pBigCard').style.backgroundImage = `url('images/cards/${pNum}.jpg')`;
        document.getElementById('cBigCard').style.backgroundImage = `url('images/cards/${cNum}.jpg')`;
        document.getElementById('pLabel').innerText = pName;
        document.getElementById('cLabel').innerText = cName;
        document.getElementById('pSide').style.display = 'block';
        document.getElementById('pSide').style.opacity = '1';
        document.getElementById('cSide').style.display = 'block';
        document.getElementById('cSide').style.opacity = '1';
    }

    function peekBoard() {
        document.getElementById('choiceOverlay').style.opacity = "0";
        document.getElementById('choiceOverlay').style.pointerEvents = "none";
        setTimeout(() => {
            document.getElementById('choiceOverlay').style.opacity = "1";
            document.getElementById('choiceOverlay').style.pointerEvents = "auto";
        }, 5000);
    }

    function startRound() {
        if(round > 10) return endGame();
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('choiceOverlay').style.display = 'flex';
        document.getElementById('choiceActions').style.display = 'block';
        document.getElementById('loadingBox').style.display = 'none';
    }

    function togglePause() {
        isPaused = !isPaused;
        const pauseOverlay = document.getElementById('pauseOverlay');
        if (isPaused) {
            pauseOverlay.classList.add('active');
            document.getElementById('choiceOverlay').style.pointerEvents = 'none';
            document.getElementById('choiceOverlay').style.opacity = '0.5';
        } else {
            pauseOverlay.classList.remove('active');
            document.getElementById('choiceOverlay').style.pointerEvents = 'auto';
            document.getElementById('choiceOverlay').style.opacity = '1';
        }
    }

    function quitGame() {
        isPaused = false;
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('pauseOverlay').classList.remove('active');
        location.reload();
    }

    function makeChoice(pChoice) {
        document.getElementById('choiceActions').style.display = 'none';
        document.getElementById('loadingBox').style.display = 'block';

        const cpuText = document.getElementById('cpuThinking');
        const resEl = document.getElementById('resultMsg');
        
        cpuText.innerHTML = "ANALYZING CPU...";
        resEl.innerHTML = "";

        const nextFileNum = deck.shift();
        const currentVal = getCardValue(currentFileNum);
        const nextVal = getCardValue(nextFileNum);
        const isUp = nextVal > currentVal;
        
        const cChoice = Math.random() > 0.5 ? 'up' : 'down';
        const pCorrect = (pChoice === 'up' && isUp) || (pChoice === 'down' && !isUp);
        const cCorrect = (cChoice === 'up' && isUp) || (cChoice === 'down' && !isUp);

        setTimeout(() => {
            const cpuChoiceLabel = cChoice === 'up' ? "HIGHER ↑" : "LOWER ↓";
            cpuText.innerHTML = `
                <span style="color:var(--cpu-glow)">${cName} (CPU Opponent)</span><br>
                CHOSE: <span style="color:var(--accent)">${cpuChoiceLabel}</span>
            `;

            setTimeout(() => {
                let pRes = pCorrect ? "✓ YOU ARE CORRECT!" : "✗ YOU ARE WRONG!";
                let cRes = cCorrect ? `✓ ${cName} IS CORRECT!` : `✗ ${cName} IS WRONG!`;
                
                resEl.innerHTML = `
                    <div class="${pCorrect ? 'correct' : 'wrong'}" style="margin-bottom: 5px;">${pRes}</div>
                    <div class="${cCorrect ? 'correct' : 'wrong'}" style="font-size: 1.2rem;">${cRes}</div>
                `;
                
                if(pCorrect) pScore += 100; else pScore -= 50;
                if(cCorrect) cScore += 100; else cScore -= 50;
            }, 1500);

        }, 1500); 

        setTimeout(() => {
            document.getElementById('choiceOverlay').style.display = 'none';
            document.getElementById(`slot-${round-1}`).style.backgroundImage = `url('images/cards/${nextFileNum}.jpg')`;
            
            if(round === 1) {
                document.getElementById('pSide').style.opacity = '0';
                document.getElementById('cSide').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('pSide').style.display = 'none'; 
                    document.getElementById('cSide').style.display = 'none';
                    document.getElementById('historyGrid').classList.add('expanded');
                }, 500);
            }
            
            document.getElementById('pScoreDisp').innerText = pScore;
            document.getElementById('cScoreDisp').innerText = cScore;
            currentFileNum = nextFileNum; 
            round++;
            
            setTimeout(startRound, 2000);
        }, 6000); 
    }

    function saveGameResult(winner, pFinal, cFinal) {
        let history = JSON.parse(localStorage.getItem('battlerHistory') || '[]');
        history.unshift({ date: new Date().toLocaleString(), winner, pName: pName, pFinal: pFinal, cName: cName, cFinal: cFinal });
        localStorage.setItem('battlerHistory', JSON.stringify(history.slice(0, 10)));
    }

    function showHistory() {
        let history = JSON.parse(localStorage.getItem('battlerHistory') || '[]');
        let rows = history.length ? history.map(h => `<tr><td>${h.date}</td><td>${h.winner}</td><td>${h.pName}: ${h.pFinal}</td><td>${h.cName}: ${h.cFinal}</td></tr>`).join('') : '<tr><td colspan="4">No battles recorded yet.</td></tr>';
        Swal.fire({
            title: 'BATTLE RECORDS',
            width: 800,
            background: '#050b18',
            color: '#fff',
            html: `<div class="history-container"><table><thead><tr><th>DATE</th><th>WINNER</th><th>PLAYER SCORE</th><th>CPU SCORE</th></tr></thead><tbody>${rows}</tbody></table></div>`,
            confirmButtonText: 'CLOSE'
        });
    }

    function endGame() {
        const winner = pScore > cScore ? pName : (pScore === cScore ? "DRAW" : cName);
        saveGameResult(winner, pScore, cScore);
        Swal.fire({
            title: 'BATTLE CONCLUDED',
            html: `<h2 style="color:var(--accent)">${winner === "DRAW" ? "IT'S A DRAW!" : winner + " VICTORIOUS!"}</h2><p>${pName}: ${pScore} | ${cName}: ${cScore}</p>`,
            confirmButtonText: 'REMATCH'
        }).then(() => location.reload());
    }

</script>
</body>
</html>
